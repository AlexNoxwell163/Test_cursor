<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор стоимости услуг — V2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Калькулятор стоимости услуг</h1>
    <p class="subtitle">Учебный проект V2 — HTML + CSS + JS</p>

    <!-- Шаг 1: выбор категории услуги -->
    <fieldset>
      <legend>Категория услуги</legend>
      <label class="option">
        <input type="radio" name="category" value="cleaning" checked />
        Клининг
      </label>
      <label class="option">
        <input type="radio" name="category" value="repair" />
        Ремонт квартиры
      </label>
      <label class="option">
        <input type="radio" name="category" value="care" />
        Уход за людьми
      </label>
    </fieldset>

    <!-- Опции клининга -->
    <fieldset id="panel-cleaning">
      <legend>Клининг — вариант</legend>
      <label class="option">
        <input type="radio" name="cleaning-type" value="full" checked />
        Полный — 2000 ₽
      </label>
      <label class="option">
        <input type="radio" name="cleaning-type" value="room" />
        Комната — 1000 ₽
      </label>
      <label class="option">
        <input type="radio" name="cleaning-type" value="area" />
        Площадь — 50 ₽/м²
      </label>
      <div class="row" id="cleaning-area-row">
        <label for="cleaning-sqm">Площадь (м²)</label>
        <input type="number" id="cleaning-sqm" min="0" step="1" value="10" />
        <p class="field-error hidden" id="cleaning-sqm-error" role="alert"></p>
      </div>
    </fieldset>

    <!-- Опции ремонта -->
    <fieldset id="panel-repair" class="hidden">
      <legend>Ремонт — основной вариант</legend>
      <label class="option">
        <input type="radio" name="repair-type" value="full" checked />
        Полный — 5000 ₽
      </label>
      <label class="option">
        <input type="radio" name="repair-type" value="room" />
        Комната — 2000 ₽
      </label>
      <label class="option">
        <input type="radio" name="repair-type" value="area" />
        Площадь — 200 ₽/м²
      </label>
      <div class="row hidden" id="repair-area-row">
        <label for="repair-sqm">Площадь (м²)</label>
        <input type="number" id="repair-sqm" min="0" step="1" value="10" />
        <p class="field-error hidden" id="repair-sqm-error" role="alert"></p>
      </div>
      <p class="extras-title">Дополнительно:</p>
      <label class="option">
        <input type="checkbox" id="repair-demolition" />
        Демонтаж — +1500 ₽
      </label>
      <label class="option">
        <input type="checkbox" id="repair-garbage" />
        Вывоз мусора — +800 ₽
      </label>
    </fieldset>

    <!-- Опции ухода за людьми -->
    <fieldset id="panel-care" class="hidden">
      <legend>Уход — тип</legend>
      <label class="option">
        <input type="radio" name="care-type" value="elderly" checked />
        Пожилой — 300 ₽/час
      </label>
      <label class="option">
        <input type="radio" name="care-type" value="disabled" />
        Инвалид — 400 ₽/час
      </label>
      <label class="option">
        <input type="radio" name="care-type" value="child" />
        Ребёнок — 250 ₽/час
      </label>
      <label class="option">
        <input type="radio" name="care-type" value="time" />
        Время (общий тариф) — 300 ₽/час
      </label>
      <div class="row">
        <label for="care-hours">Количество часов</label>
        <input type="number" id="care-hours" min="0" step="1" value="2" />
        <p class="field-error hidden" id="care-hours-error" role="alert"></p>
      </div>
    </fieldset>

    <div id="total-box">
      <span>Итого</span>
      <strong id="total-sum">—</strong>
      <div id="breakdown"></div>
    </div>

    <footer class="help">
      Откройте index.html в браузере. Рядом должны лежать style.css и script.js.
    </footer>

    <script src="script.js"></script>

    <!--
    ИНСТРУКЦИЯ: откройте index.html в браузере (Chrome, Firefox, Edge).
    Файлы в одной папке: index.html, style.css, script.js. Сервер не нужен.

    Примеры:
    - Клининг, площадь 10 м² → 500 + 10×50 = 1000 ₽
    - Ремонт полный + демонтаж → 500 + 5000 + 1500 = 7000 ₽
    - Уход пожилой, 2 ч → 500 + 300×2 = 1100 ₽
    -->
  </body>
</html>
